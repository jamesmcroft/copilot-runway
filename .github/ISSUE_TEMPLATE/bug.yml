name: Bug
description: Log a bug to help us improve
title: "[Bug] "
labels: [bug]
body:
  - type: textarea
    validations:
      required: true
    attributes:
      label: Describe the bug
      description: Please describe below the details of the issue and steps taken to reproduce.
  - type: dropdown
    attributes:
      label: Operating system
      options:
        - "Windows"
        - "macOS"
        - "Linux"
  - type: input
    attributes:
      label: Node.js version
      description: Output of `node --version`
      placeholder: "v20.0.0"
  - type: textarea
    attributes:
      label: What is the expected behavior?
      description: Please describe below what you expected to happen.
  - type: textarea
    attributes:
      label: Other information
      description: Please provide any additional information, links, screenshots, or console output below if applicable.
