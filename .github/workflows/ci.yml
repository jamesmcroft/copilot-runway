name: CI

on:
  push:
    tags:
    - v*
    branches:
    - main
    paths:
    - server.js
    - public/**
    - bin/**
    - lib/**
    - test/**
    - package.json
    - package-lock.json
    - .github/workflows/ci.yml
  pull_request:
    branches:
    - main
    paths:
    - server.js
    - public/**
    - bin/**
    - lib/**
    - test/**
    - package.json
    - package-lock.json
    - .github/workflows/ci.yml
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 20
        cache: npm

    - name: Install dependencies
      run: npm ci

    - name: Run tests
      if: matrix.os != 'ubuntu-latest'
      run: npm test

    - name: Run tests with coverage
      if: matrix.os == 'ubuntu-latest'
      run: npm run test:coverage

    - name: Generate coverage report
      if: matrix.os == 'ubuntu-latest'
      uses: danielpalme/ReportGenerator-GitHub-Action@5
      with:
        reports: 'coverage/lcov.info'
        targetdir: 'coverage-report'
        reporttypes: 'MarkdownSummaryGithub;Cobertura'

    - name: Publish coverage to workflow summary
      if: matrix.os == 'ubuntu-latest'
      run: cat coverage-report/SummaryGithub.md >> $GITHUB_STEP_SUMMARY

    - name: Post coverage to PR
      if: matrix.os == 'ubuntu-latest' && github.event_name == 'pull_request'
      run: gh pr comment $PR_NUMBER --edit-last --create-if-none --body-file coverage-report/SummaryGithub.md
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        PR_NUMBER: ${{ github.event.number }}

    - name: Verify server starts
      shell: bash
      run: |
        node server.js &
        SERVER_PID=$!
        sleep 3
        STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:3847/ || echo "000")
        kill $SERVER_PID 2>/dev/null || true
        if [ "$STATUS" != "200" ]; then
          echo "Server health check failed with status $STATUS"
          exit 1
        fi
        echo "Server health check passed (HTTP $STATUS)"

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
    - uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 24
        registry-url: https://registry.npmjs.org
        cache: npm

    - name: Install dependencies
      run: npm ci

    - name: Set version from tag
      run: |
        VERSION="${GITHUB_REF#refs/tags/v}"
        npm version "$VERSION" --no-git-tag-version
        echo "Publishing version $VERSION"

    - name: Publish to npm
      run: npm publish --provenance --access public
